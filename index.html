<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fireworks ✨</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&family=Poppins:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- 全屏按钮 -->
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <!-- 英文文本区域 -->
    <div class="text-container">
      <div class="main-text">Beautiful Fireworks</div>
      <div class="sub-text">Every moment is precious</div>
    </div>

    <!-- 放烟花按钮 -->
    <button class="fireworks-btn" id="fireworksBtn">放烟花吧</button>

    <!-- 星星背景容器 -->
    <div class="stars" id="stars"></div>

    <!-- 山脉装饰 -->
    <div class="mountains"></div>

    <!-- 烟花画布 -->
    <canvas id="fireworksCanvas"></canvas>

    <script src="js/fireworks.js"></script>
  </body>
</html>
