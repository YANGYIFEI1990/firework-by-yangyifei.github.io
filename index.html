<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>放烟花 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #030712;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    font-family: 'Noto Serif SC', serif;
  }

  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* 星空背景 */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }

  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  /* 远山剪影 */
  .mountains {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    z-index: 2;
    pointer-events: none;
  }

  /* UI 层 */
  .ui {
    position: fixed;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 72px;
  }

  .title {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }

  .title h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: #fde8c0;
    text-shadow:
      0 0 20px rgba(255, 180, 60, 0.6),
      0 0 60px rgba(255, 120, 20, 0.3);
    letter-spacing: 0.2em;
  }

  .title p {
    font-size: 0.85rem;
    color: rgba(253, 220, 160, 0.45);
    letter-spacing: 0.3em;
    margin-top: 6px;
  }

  /* 按钮 */
  .btn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .btn {
    position: relative;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    outline: none;
  }

  .btn-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 18px 52px;
    border-radius: 60px;
    background: linear-gradient(135deg, #ff6b35, #f7931e, #ffcd3c);
    box-shadow:
      0 0 30px rgba(255, 140, 30, 0.5),
      0 0 80px rgba(255, 100, 10, 0.25),
      inset 0 1px 0 rgba(255,255,255,0.25);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.5rem;
    color: #1a0500;
    letter-spacing: 0.15em;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn:hover .btn-inner {
    transform: scale(1.06);
    box-shadow:
      0 0 50px rgba(255, 140, 30, 0.8),
      0 0 120px rgba(255, 100, 10, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .btn:active .btn-inner {
    transform: scale(0.97);
  }

  /* 光晕脉冲 */
  .btn::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 70px;
    background: radial-gradient(ellipse, rgba(255,140,30,0.25) 0%, transparent 70%);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.15); opacity: 1; }
  }

  .hint {
    font-size: 0.78rem;
    color: rgba(253, 220, 160, 0.35);
    letter-spacing: 0.25em;
  }

  /* 点击涟漪 */
  .ripple {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,200,80,0.3), transparent 70%);
    pointer-events: none;
    z-index: 9;
    animation: ripple-out 0.8s ease-out forwards;
    transform: translate(-50%, -50%);
  }
  @keyframes ripple-out {
    from { width: 0; height: 0; opacity: 1; }
    to   { width: 200px; height: 200px; opacity: 0; }
  }
</style>
</head>
<body>

<!-- 星空 -->
<div class="stars" id="stars"></div>

<!-- 烟花画布 -->
<canvas id="canvas"></canvas>

<!-- 远山 -->
<svg class="mountains" viewBox="0 0 1440 200" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M0,200 L0,140 Q80,80 160,120 Q240,160 320,100 Q400,40 480,90 Q560,140 640,80 Q720,20 800,70 Q880,120 960,60 Q1040,0 1120,50 Q1200,100 1280,60 Q1360,20 1440,80 L1440,200 Z" fill="#0a0f1a"/>
  <path d="M0,200 L0,165 Q120,130 240,155 Q360,180 480,145 Q600,110 720,150 Q840,190 960,155 Q1080,120 1200,155 Q1320,190 1440,160 L1440,200 Z" fill="#080c14"/>
</svg>

<!-- UI -->
<div class="title">
  <h1>✨ 放 烟 花</h1>
  <p>Tonight is beautiful</p>
</div>

<div class="ui">
  <div class="btn-wrap">
    <button class="btn" id="fireBtn" onclick="launchFireworks()">
      <div class="btn-inner">🎆 放 烟 花</div>
    </button>
    <span class="hint">点击按钮，或点击夜空任意位置</span>
  </div>
</div>

<script>
// ===== 星空生成 =====
const starsEl = document.getElementById('stars');
for (let i = 0; i < 160; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    top:${Math.random()*85}%;
    left:${Math.random()*100}%;
    --d:${(Math.random()*3+2).toFixed(1)}s;
    animation-delay:${(Math.random()*4).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}

// ===== 烟花引擎 =====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 调色板：温馨暖色 + 少量冷色点缀
const PALETTES = [
  ['#ff9a3c','#ffcd3c','#ff6b35','#ffeaa7'],
  ['#fd79a8','#fdcb6e','#e17055','#fab1a0'],
  ['#a29bfe','#fd79a8','#fdcb6e','#ff7675'],
  ['#55efc4','#ffeaa7','#fd79a8','#74b9ff'],
  ['#ff6b6b','#feca57','#ff9ff3','#54a0ff'],
  ['#ffffff','#ffeaa7','#ff9a3c','#fdcb6e'],
];

class Particle {
  constructor(x, y, color, vx, vy, size, life, gravity = 0.06, fade = 0.015) {
    this.x = x; this.y = y;
    this.color = color;
    this.vx = vx; this.vy = vy;
    this.size = size;
    this.life = life; this.maxLife = life;
    this.gravity = gravity;
    this.fade = fade;
    this.trail = [];
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 6) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.98;
    this.life -= this.fade;
  }
  draw() {
    const alpha = Math.max(0, this.life / this.maxLife);
    // 拖尾
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const ta = alpha * (i / this.trail.length) * 0.4;
      ctx.beginPath();
      ctx.arc(t.x, t.y, this.size * 0.6 * (i / this.trail.length), 0, Math.PI * 2);
      ctx.fillStyle = this.color + Math.floor(ta * 255).toString(16).padStart(2,'0');
      ctx.fill();
    }
    // 主粒子
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = this.color + Math.floor(alpha * 255).toString(16).padStart(2,'0');
    ctx.shadowColor = this.color;
    ctx.shadowBlur = this.size * 4;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  isDead() { return this.life <= 0; }
}

class Rocket {
  constructor(x, targetY, color) {
    this.x = x;
    this.y = H + 10;
    this.targetY = targetY;
    this.color = color;
    this.vy = -(H - targetY) / 40;
    this.trail = [];
    this.exploded = false;
  }
  update() {
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > 12) this.trail.shift();
    this.x += (Math.random() - 0.5) * 0.8;
    this.y += this.vy;
    if (this.y <= this.targetY) {
      this.exploded = true;
      explode(this.x, this.y);
    }
  }
  draw() {
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      const alpha = (i / this.trail.length) * 0.8;
      const size = (i / this.trail.length) * 3;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,200,100,${alpha})`;
      ctx.shadowColor = '#ffcd3c';
      ctx.shadowBlur = 8;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

const particles = [];
const rockets = [];

function explode(x, y) {
  const palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  const type = Math.floor(Math.random() * 5);
  const count = 100 + Math.floor(Math.random() * 80);

  if (type === 0) {
    // 圆形爆炸
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2;
      const speed = Math.random() * 4 + 1.5;
      const color = palette[Math.floor(Math.random() * palette.length)];
      particles.push(new Particle(x, y, color,
        Math.cos(angle) * speed, Math.sin(angle) * speed,
        Math.random() * 2.5 + 0.5, 1, 0.045, 0.012));
    }
  } else if (type === 1) {
    // 菊花型：多环
    for (let ring = 0; ring < 3; ring++) {
      const n = 30 + ring * 20;
      const speed = 2.5 + ring * 1.5;
      const color = palette[ring % palette.length];
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2;
        particles.push(new Particle(x, y, color,
          Math.cos(angle) * speed, Math.sin(angle) * speed,
          2 - ring * 0.3, 1, 0.04 + ring * 0.005, 0.013));
      }
    }
  } else if (type === 2) {
    // 星形
    const arms = 6;
    for (let arm = 0; arm < arms; arm++) {
      const base = (arm / arms) * Math.PI * 2;
      const color = palette[arm % palette.length];
      for (let j = 0; j < 15; j++) {
        const angle = base + (Math.random() - 0.5) * 0.3;
        const speed = 1.5 + j * 0.25;
        particles.push(new Particle(x, y, color,
          Math.cos(angle) * speed, Math.sin(angle) * speed,
          2.5 - j * 0.1, 1, 0.04, 0.011));
      }
    }
  } else if (type === 3) {
    // 瀑布型：向上喷出后下落
    for (let i = 0; i < count; i++) {
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.6;
      const speed = Math.random() * 5 + 1;
      const color = palette[Math.floor(Math.random() * palette.length)];
      particles.push(new Particle(x, y, color,
        Math.cos(angle) * speed, Math.sin(angle) * speed,
        Math.random() * 2 + 0.5, 1, 0.07, 0.010));
    }
  } else {
    // 闪光型：大量细小粒子
    for (let i = 0; i < 200; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 6;
      const color = palette[Math.floor(Math.random() * palette.length)];
      particles.push(new Particle(x, y, color,
        Math.cos(angle) * speed, Math.sin(angle) * speed,
        Math.random() * 1.5 + 0.3, 1, 0.03 + Math.random() * 0.03, 0.015));
    }
  }

  // 中心闪光
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    particles.push(new Particle(x, y, '#ffffff',
      Math.cos(angle) * (Math.random() * 2), Math.sin(angle) * (Math.random() * 2),
      Math.random() * 3 + 1, 1, 0.02, 0.03));
  }
}

function launchFireworks(targetX, targetY) {
  const x = targetX || (W * 0.2 + Math.random() * W * 0.6);
  const y = targetY || (H * 0.1 + Math.random() * H * 0.45);
  const palette = PALETTES[Math.floor(Math.random() * PALETTES.length)];
  const color = palette[0];
  rockets.push(new Rocket(x, y, color));
}

function launchMultiple() {
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < count; i++) {
    setTimeout(() => launchFireworks(), i * 200);
  }
}

// 点击夜空放烟花
canvas.addEventListener('click', (e) => {
  launchFireworks(e.clientX, e.clientY - 50);
  createRipple(e.clientX, e.clientY);
});

function createRipple(x, y) {
  const r = document.createElement('div');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  document.body.appendChild(r);
  setTimeout(() => r.remove(), 800);
}

// 主循环
function loop() {
  ctx.fillStyle = 'rgba(3, 7, 18, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // 更新火箭
  for (let i = rockets.length - 1; i >= 0; i--) {
    rockets[i].update();
    rockets[i].draw();
    if (rockets[i].exploded) rockets.splice(i, 1);
  }

  // 更新粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].isDead()) particles.splice(i, 1);
  }

  requestAnimationFrame(loop);
}
loop();

// 页面加载后自动放一波
setTimeout(() => launchMultiple(), 800);
setTimeout(() => launchMultiple(), 2200);
</script>
</body>
</html>
