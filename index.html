<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500&family=Poppins:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0f24;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: 'Quicksand', 'Poppins', sans-serif;
        }

        /* 烟花画布 */
        canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 1; /* 完全不透明，最大化亮度 */
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: #f8f9fa;
            border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite alternate;
            opacity: 0.8;
        }

        @keyframes twinkle {
            from { opacity: 0.3; transform: scale(0.9); }
            to   { opacity: 0.8; transform: scale(1.1); }
        }

        /* 山脉底部装饰 */
        .mountains {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%;
            height: 15vh;
            background: linear-gradient(to top, #141b38, transparent);
            z-index: 2;
            pointer-events: none;
        }

        /* 全屏按钮 */
        .fullscreen-btn {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 20;
            width: 44px; height: 44px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            color: #f8f9fa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* 放烟花按钮 - 液态玻璃风格 */
        .fireworks-btn {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            padding: 14px 36px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            color: #f8f9fa;
            font-family: 'Quicksand', sans-serif;
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            pointer-events: auto;
            outline: none;
        }

        .fireworks-btn:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18);
            transform: translateX(-50%) translateY(-2px);
        }

        .fireworks-btn:active {
            transform: translateX(-50%) translateY(0);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
        }

        /* 英文文本 - 更靠上（调整为10%） */
        .text-container {
            position: fixed;
            top: 10%; /* 从20%改为10%，更贴近顶部 */
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .main-text {
            font-size: 2.2rem;
            color: #f8f9fa;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .sub-text {
            font-size: 1rem;
            color: #e0e7ff;
            font-weight: 200;
            letter-spacing: 0.05em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <!-- 全屏按钮 -->
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <!-- 英文文本区域 -->
    <div class="text-container">
        <div class="main-text">Beautiful Fireworks</div>
        <div class="sub-text">Every moment is precious</div>
    </div>

    <!-- 放烟花按钮 -->
    <button class="fireworks-btn" id="fireworksBtn">放烟花</button>

    <!-- 星星背景容器 -->
    <div class="stars" id="stars"></div>

    <!-- 山脉装饰 -->
    <div class="mountains"></div>

    <!-- 烟花画布 -->
    <canvas id="fireworksCanvas"></canvas>

    <script>
        // 1. 生成星星背景
        const starsContainer = document.getElementById('stars');
        const starCount = 150;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            star.style.left = `${Math.random() * 100}vw`;
            star.style.top = `${Math.random() * 100}vh`;
            star.style.width = `${Math.random() * 2 + 1}px`;
            star.style.height = star.style.width;
            star.style.setProperty('--d', `${Math.random() * 3 + 2}s`);
            starsContainer.appendChild(star);
        }

        // 2. 全屏按钮功能
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`全屏请求失败: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        // 3. 烟花核心逻辑
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        
        // 适配窗口大小
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 存储烟花弹和粒子
        let fireworks = [];
        let particles = [];

        // 烟花弹类（升空阶段）
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = y;
                this.speed = Math.random() * 3 + 4;
                this.acceleration = 0.05;
                // 初始颜色更亮：亮度提升到70%
                this.color = `hsl(${Math.random() * 360}, 90%, 70%)`;
                this.size = 4; // 烟花弹尺寸增大，更醒目
                this.exploded = false;
            }

            update() {
                this.speed += this.acceleration;
                this.y -= this.speed;

                if (this.y <= this.targetY) {
                    this.explode();
                    this.exploded = true;
                }
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // 尾部拖影更亮
                ctx.globalAlpha = 0.6;
                ctx.arc(this.x, this.y + 10, this.size / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // 炸开生成粒子（替换十字形为螺旋形，共5种自然绚烂样式）
            explode() {
                const particleCount = 150; // 粒子数量增加，更绚烂
                const style = Math.floor(Math.random() * 5);

                for (let i = 0; i < particleCount; i++) {
                    let angle, speed, decay, size, color;

                    // 样式1：圆形扩散（基础款，亮度提升）
                    if (style === 0) {
                        angle = Math.random() * Math.PI * 2;
                        speed = Math.random() * 5 + 2; // 速度稍快，更有张力
                        decay = Math.random() * 0.006 + 0.001; // 衰减更慢，持续更久
                        size = 2.5; // 粒子更大
                        color = `hsl(${parseInt(this.color.match(/\d+/)[0]) + Math.random() * 20 - 10}, 95%, 75%)`;
                    }
                    // 样式2：心形扩散（更亮的粉色系）
                    else if (style === 1) {
                        const t = Math.random() * Math.PI * 2;
                        angle = t;
                        const r = 16 * Math.pow(Math.sin(t), 3);
                        speed = (Math.random() * 4 + 1) * (r / 16 + 0.5);
                        decay = Math.random() * 0.005 + 0.002;
                        size = 2.2;
                        color = `hsl(${340 + Math.random() * 20}, 100%, 80%)`; // 亮度提升到80%
                    }
                    // 样式3：螺旋形扩散（替换十字形，自然绚烂）
                    else if (style === 2) {
                        // 螺旋角度计算，更自然的轨迹
                        const spiralFactor = 0.08;
                        angle = Math.random() * Math.PI * 2 + (i * spiralFactor);
                        speed = Math.random() * 6 + 1;
                        decay = Math.random() * 0.007 + 0.001;
                        size = 2.0;
                        color = `hsl(${200 + Math.random() * 30}, 95%, 75%)`; // 亮蓝色系
                    }
                    // 样式4：环形扩散（双层，更亮的黄色系）
                    else if (style === 3) {
                        angle = Math.random() * Math.PI * 2;
                        speed = Math.random() * 4 + 3;
                        decay = Math.random() * 0.006 + 0.001;
                        size = 2.0;
                        color = `hsl(${60 + Math.random() * 30}, 100%, 80%)`; // 亮度提升到80%
                        // 额外生成内层粒子，更浓密
                        if (i % 2 === 0) {
                            particles.push(new Particle(this.x, this.y, angle, speed/2, decay*1.1, 1.5, color));
                        }
                    }
                    // 样式5：不规则散射（全色系高亮）
                    else if (style === 4) {
                        angle = Math.random() * Math.PI * 2;
                        speed = Math.random() * 5 + 1;
                        decay = Math.random() * 0.005 + 0.002;
                        size = 2.0;
                        color = `hsl(${Math.random() * 360}, 95%, 80%)`; // 全色系亮度80%
                    }

                    particles.push(new Particle(this.x, this.y, angle, speed, decay, size, color));
                }
            }
        }

        // 烟花粒子类（优化亮度和持续时间）
        class Particle {
            constructor(x, y, angle, speed, decay, size, color) {
                this.x = x;
                this.y = y;
                this.angle = angle;
                this.speed = speed;
                this.gravity = 0.01; // 重力更弱，下落更慢
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.alpha = 1;
                this.decay = decay; // 更慢的衰减
                this.size = size;
                this.color = color;
            }

            update() {
                // 更弱的空气阻力，粒子运动更持久
                this.vx *= 0.995;
                this.vy *= 0.995;
                this.vy += this.gravity;

                this.x += this.vx;
                this.y += this.vy;
                // 衰减速度大幅降低，持续时间延长
                this.alpha -= this.decay * (1 - this.alpha/2);
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                // 外发光效果增强，更绚烂
                ctx.shadowBlur = 15; // 从8增加到15
                ctx.shadowColor = this.color;
                ctx.restore();
            }
        }

        // 生成单枚烟花
        function createFirework(x, y) {
            fireworks.push(new Firework(x, y));
        }

        // 生成随机烟花
        function createRandomFireworks(count = 1) {
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const x = Math.random() * (canvas.width - 200) + 100;
                    const y = Math.random() * (canvas.height / 2) + 50;
                    createFirework(x, y);
                }, i * 200);
            }
        }

        // 放烟花按钮事件
        const fireworksBtn = document.getElementById('fireworksBtn');
        fireworksBtn.addEventListener('click', () => {
            const count = Math.floor(Math.random() * 2) + 2;
            createRandomFireworks(count);
        });

        // 点击页面任意位置生成单枚烟花
        canvas.addEventListener('click', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            createFirework(x, y);
        });

        // 动画循环
        function animate() {
            ctx.fillStyle = 'rgba(10, 15, 36, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 更新烟花弹
            fireworks = fireworks.filter(firework => {
                if (!firework.exploded) {
                    firework.update();
                    firework.draw();
                    return true;
                }
                return false;
            });

            // 更新粒子
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return particle.alpha > 0;
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
